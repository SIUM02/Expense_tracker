
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --color-text-primary: #0f1724;
      --color-text-secondary: #475569;
      --color-text-tertiary: #94a3b8;
      --color-text-danger: #ef4444;
      --color-text-success: #16a34a;
      --color-text-info: #0ea5e9;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8fafc;
      --color-border-tertiary: #e6eef6;
      --color-border-info: #bae6fd;
      --accent-1: #6366f1;
      --accent-2: #06b6d4;
      --border-radius-lg: 14px;
      --border-radius-md: 10px;
    }
. { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: linear-gradient(180deg, #fbfdff 0%, #f7fbff 100%); padding: 3rem 1rem; color: var(--color-text-primary); }
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 1rem;
}
.section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 6px 20px rgba(15,23,36,0.05);
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}
.form-group input,
.form-group select,
.form-group input[type="date"],
.form-group input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e6eef6;
  border-radius: 8px;
  background: #fff;
  color: var(--color-text-primary);
  font-size: 14px;
  transition: box-shadow .12s ease, transform .08s ease, border-color .12s ease;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.form-group input::placeholder { color: var(--color-text-tertiary); }
.form-group input:focus,
.form-group select:focus,
.form-group input[type="date"]:focus,
.form-group input[type="number"]:focus {
  box-shadow: 0 6px 18px rgba(6,182,212,0.08);
  border-color: var(--accent-2);
  transform: translateY(-1px);
}
/* remove spinner arrows for number inputs on WebKit */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.btn-add {
  width: 100%;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
  color: #fff;
  border: 0;
  border-radius: calc(var(--border-radius-md) - 2px);
  box-shadow: 0 6px 18px rgba(99,102,241,0.18);
}
.btn-add:hover { transform: translateY(-1px); }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 1rem;
}
.metric {
  background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
  border-radius: calc(var(--border-radius-md) - 2px);
  padding: 0.9rem 1rem;
  border: 1px solid var(--color-border-tertiary);
}
.metric-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}
.metric-value {
  font-size: 22px;
  font-weight: 500;
  color: var(--color-text-primary);
}
.metric-value.danger { color: var(--color-text-danger); }
.metric-value.success { color: var(--color-text-success); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  text-align: left;
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-secondary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
tbody tr {
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
tbody td {
  padding: 10px 10px;
  color: var(--color-text-primary);
}
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.badge.food { background: #ECFDF5; color: #065f46; }
.badge.transport { background: #EFF6FF; color: #0b4a82; }
.badge.books { background: #F5F3FF; color: #4c1d95; }
.badge.other { background: #FEF3C7; color: #755c0a; }
.delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-text-secondary);
  font-size: 18px;
  padding: 6px;
}
.delete-btn:hover { color: var(--color-text-danger); transform: scale(1.05); }
.table-row:hover { background: #fbfdff; }
.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--color-text-tertiary);
  font-size: 14px;
}
table tbody tr td { transition: background .12s ease; }
</style>
</head>
<body>

<div class="container">

  <p style="font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.5rem;">
    <i class="ti ti-wallet" aria-hidden="true" style="font-size: 20px; margin-right: 8px;"></i>Student expense tracker
  </p>

  <div class="section-label">Summary</div>
  <div class="summary-grid">
    <div class="metric">
      <div class="metric-label">Monthly budget</div>
      <div class="metric-value">৳5,000</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total spent</div>
      <div class="metric-value danger">৳2,340</div>
    </div>
    <div class="metric">
      <div class="metric-label">Remaining</div>
      <div class="metric-value success">৳2,660</div>
    </div>
  </div>

  <div class="section-label">Add expense</div>
  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label for="desc">Description</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Bus fare…" />
      </div>
      <div class="form-group">
        <label for="amount">Amount (৳)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="">Select category</option>
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="books">Books & study</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
    </div>
    <button class="btn-add" onclick="addExpense()">
      <i class="ti ti-plus" aria-hidden="true"></i> Add expense
    </button>
  </div>

  <div class="section-label">Expenses</div>
  <div class="card" style="padding: 0; overflow: hidden;">
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Category</th>
          <th>Date</th>
          <th>Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expense-list">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <i class="ti ti-receipt-off" style="font-size: 24px; display: block; margin-bottom: 6px;" aria-hidden="true"></i>
              No expenses yet — add one above
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
let expenses = [];
const budget = 5000;

function getCategoryLabel(c) {
  return { food: "Food", transport: "Transport", books: "Books & study", other: "Other" }[c] || c;
}

async function loadExpenses() {
  try {
    const response = await fetch('/api/expenses');
    if (!response.ok) throw new Error('Unable to load expenses');
    expenses = await response.json();
    render();
  } catch (error) {
    console.error(error);
  }
}

function render() {
  const list = document.getElementById("expense-list");
  if (expenses.length === 0) {
    list.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="ti ti-receipt-off" style="font-size:24px;display:block;margin-bottom:6px;" aria-hidden="true"></i>No expenses yet — add one above</div></td></tr>`;
  } else {
    list.innerHTML = expenses.map(e => `
      <tr>
        <td>${e.desc}</td>
        <td><span class="badge ${e.category}">${getCategoryLabel(e.category)}</span></td>
        <td style="color: var(--color-text-secondary);">${e.date}</td>
        <td style="font-weight:500;">৳${Number(e.amount).toLocaleString()}</td>
        <td>
          <button class="delete-btn" onclick="deleteExpense(${e.id})" aria-label="Delete">
            <i class="fa fa-trash-o"></i>
          </button>
        </td>
      </tr>`).join("");
  }

  const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const remaining = budget - total;
  document.querySelectorAll(".metric")[1].querySelector(".metric-value").textContent = "৳" + total.toLocaleString();
  const rem = document.querySelectorAll(".metric")[2].querySelector(".metric-value");
  rem.textContent = "৳" + remaining.toLocaleString();
  rem.className = "metric-value " + (remaining < 0 ? "danger" : "success");
}

async function addExpense() {
  const desc = document.getElementById("desc").value.trim();
  const amount = parseFloat(document.getElementById("amount").value);
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;
  if (!desc || isNaN(amount) || !category || !date) return;

  const response = await fetch('/api/expenses', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ desc, category, date, amount })
  });

  if (!response.ok) return;
  const created = await response.json();
  expenses.unshift(created);
  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("category").value = "";
  document.getElementById("date").value = "";
  render();
}

async function deleteExpense(id) {
  const response = await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
  if (!response.ok) return;
  expenses = expenses.filter(e => e.id !== id);
  render();
}

loadExpenses();
</script>
</body>
</html>
